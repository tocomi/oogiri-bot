name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  functions:
    name: Functions CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache postgres Docker image
        id: cache-postgres
        uses: actions/cache@v4
        with:
          path: /tmp/docker-images/postgres-16.tar
          key: docker-postgres-16

      - name: Pull and save postgres image
        if: steps.cache-postgres.outputs.cache-hit != 'true'
        run: |
          docker pull postgres:16
          mkdir -p /tmp/docker-images
          docker save postgres:16 -o /tmp/docker-images/postgres-16.tar

      - name: Load cached postgres image
        if: steps.cache-postgres.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-images/postgres-16.tar

      - name: Run lint
        run: pnpm lint

      - name: Check format
        run: pnpm format:check

      - name: Run type-check
        run: pnpm type-check

      - name: Run tests
        run: pnpm test

  admin:
    name: Admin CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @oogiri-bot/admin exec playwright install --with-deps chromium

      - name: Run lint
        run: pnpm admin:lint

      - name: Check format
        run: pnpm admin:format:check

      - name: Run type-check
        run: pnpm admin:type-check

      - name: Run tests
        run: pnpm admin:test

      - name: Run build
        run: pnpm admin:build
