name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint-format-typecheck:
    name: Lint, Format, and Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.1"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install && pnpm --filter api generate-schema

      - name: Run lint
        run: pnpm lint

      - name: Check format
        run: pnpm format

      - name: Run type-check
        run: pnpm type-check

      - name: Run tests
        run: pnpm test
