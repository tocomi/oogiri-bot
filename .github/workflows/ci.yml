name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint-format-typecheck:
    name: Lint, Format, and Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Cache postgres Docker image
        id: cache-postgres
        uses: actions/cache@v4
        with:
          path: /tmp/docker-images/postgres-16.tar
          key: docker-postgres-16

      - name: Pull and save postgres image
        if: steps.cache-postgres.outputs.cache-hit != 'true'
        run: |
          docker pull postgres:16
          mkdir -p /tmp/docker-images
          docker save postgres:16 -o /tmp/docker-images/postgres-16.tar

      - name: Load cached postgres image
        if: steps.cache-postgres.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-images/postgres-16.tar

      - name: Run lint
        run: yarn lint

      - name: Check format
        run: yarn biome format

      - name: Run type-check
        run: yarn type-check

      - name: Run tests
        run: yarn test
